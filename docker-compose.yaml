services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./productmanagementsystem
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: mariadb
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb

volumes:
  uploads: